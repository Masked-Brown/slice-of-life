<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slice of Life — a pizza shop game</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23e0b260'/%3E%3Ccircle cx='16' cy='16' r='11' fill='%23c23a1c'/%3E%3Ccircle cx='12' cy='13' r='3' fill='%23d8442e'/%3E%3Ccircle cx='20' cy='18' r='3' fill='%23d8442e'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="viewport">
    <div id="game-root">
      <canvas id="game-canvas" width="1280" height="720"></canvas>
      <div id="ui-layer">

        <!-- Title screen menu -->
        <div id="ui-title" class="ui-screen hidden">
          <div class="title-card">
            <div class="title-name">SLICE OF LIFE</div>
            <div class="title-tag">one chef · one shop · one perfect loop</div>
            <button class="btn btn-big hidden" id="btn-continue">CONTINUE</button>
            <button class="btn btn-big" id="btn-new">NEW GAME</button>
            <button class="hud-btn" id="btn-mute-title" title="Toggle sound">🔊</button>
          </div>
        </div>

        <!-- In-game HUD -->
        <div id="ui-hud" class="hidden">
          <div class="hud-pill" id="hud-day">Day 1</div>
          <div class="hud-pill hud-money" id="hud-money">£0.00</div>
          <div class="hud-pill hud-rating">
            <span class="stars">
              <span class="stars-bg">★★★★★</span>
              <span class="stars-fg" id="hud-stars-fg">★★★★★</span>
            </span>
            <span id="hud-rating-num">3.0</span>
          </div>
          <div class="hud-pill" id="hud-progress">Served 0 / 5</div>
          <div class="hud-pill hud-goal" id="hud-goal"></div>
          <button class="hud-btn" id="btn-mute" title="Toggle sound">🔊</button>
        </div>

        <!-- Pinned order ticket -->
        <div id="ui-ticket" class="hidden"></div>

        <!-- Day 1 tutorial bubble -->
        <div id="ui-tutorial" class="hidden"></div>

        <!-- Day end receipt -->
        <div id="ui-dayend" class="ui-screen hidden"></div>

        <!-- Upgrade shop -->
        <div id="ui-shop" class="ui-screen hidden"></div>

      </div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
